<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Восстановление пароля от аккаунта IRONFLOW. Введите email для получения ссылки сброса.">
    <meta name="keywords" content="IRONFLOW, восстановление пароля, сброс пароля, фитнес">
    <title>IRONFLOW | Восстановление пароля</title>
    <link rel="stylesheet" href="stuly.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .reset-page { padding: 120px 0 80px; min-height: 100vh; }
        .reset-container { max-width: 440px; margin: 0 auto; }
        .reset-card { background: var(--gray); border-radius: var(--border-radius-lg); padding: 36px; border: 1px solid var(--light-gray); }
        .reset-title { font-family: var(--font-heading); font-size: 28px; color: var(--white); margin-bottom: 8px; }
        .reset-subtitle { color: var(--text-gray); margin-bottom: 24px; font-size: 14px; }
        .reset-form .form-group { margin-bottom: 18px; }
        .reset-form label { display: block; margin-bottom: 6px; color: var(--text-light); font-size: 14px; }
        .reset-form .input-with-icon input { padding: 14px 45px 14px 50px; }
        .reset-message { padding: 14px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .reset-message.success { background: rgba(76,175,80,0.2); color: #81c784; display: block; }
        .reset-message.error { background: rgba(255,82,82,0.2); color: #ff8a80; display: block; }
        .reset-message.info { background: rgba(255,107,53,0.15); color: var(--orange); display: block; }
    </style>
</head>
<body class="auth-page">
    <nav class="navbar auth-navbar">
        <div class="container">
            <div class="nav-container">
                <a href="sait.html" class="logo">
                    <span class="logo-icon"></span>
                    <span class="logo-text">IRON<span class="orange-text">FLOW</span></span>
                </a>
                <div class="auth-nav-links">
                    <a href="sait.html#login" class="nav-link">Вход</a>
                    <a href="sait.html#register" class="nav-link">Регистрация</a>
                    <a href="sait.html" class="nav-link">На главную</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="reset-page">
        <div class="container reset-container">
            <div class="reset-card">
                <h1 class="reset-title">Новый пароль</h1>
                <p class="reset-subtitle">Введите новый пароль для вашего аккаунта</p>
                <div class="reset-message" id="resetMessage"></div>
                <form id="resetForm" class="reset-form">
                    <input type="hidden" id="resetToken" name="token">
                    <div class="form-group">
                        <label>Новый пароль</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" required minlength="6" placeholder="Не менее 6 символов">
                            <button type="button" class="show-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Повторите пароль</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPasswordConfirm" required minlength="6" placeholder="Повторите пароль">
                            <button type="button" class="show-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-check"></i> Сохранить пароль</button>
                </form>
                <p style="text-align: center; margin-top: 20px;">
                    <a href="sait.html#login" class="auth-link">Войти</a> &middot; <a href="sait.html" class="auth-link">На главную</a>
                </p>
            </div>
        </div>
    </section>

    <script>
        (function() {
            var API = (window.location.origin || 'http://localhost:5000') + '/api';
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            var msgEl = document.getElementById('resetMessage');
            document.getElementById('resetToken').value = token || '';

            function showMsg(t, type) {
                msgEl.textContent = t;
                msgEl.className = 'reset-message ' + (type || '');
            }

            if (!token) {
                showMsg('Неверная или устаревшая ссылка. Запросите восстановление пароля снова.', 'error');
            }

            document.querySelectorAll('.show-password').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var wrap = btn.closest('.input-with-icon');
                    var input = wrap && wrap.querySelector('input');
                    if (!input) return;
                    var icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        if (icon) { icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
                    } else {
                        input.type = 'password';
                        if (icon) { icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
                    }
                });
            });

            document.getElementById('resetForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if (!token) return;
                var newP = document.getElementById('newPassword').value;
                var newPC = document.getElementById('newPasswordConfirm').value;
                if (newP !== newPC) {
                    showMsg('Пароли не совпадают', 'error');
                    return;
                }
                if (newP.length < 6) {
                    showMsg('Пароль не менее 6 символов', 'error');
                    return;
                }
                var btn = this.querySelector('button[type="submit"]');
                btn.disabled = true;
                fetch(API + '/password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newP })
                })
                    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                    .then(function(result) {
                        if (result.ok) {
                            showMsg(result.data.message + ' Переход на страницу входа через 3 сек.', 'success');
                            setTimeout(function() { window.location.href = 'sait.html#login'; }, 3000);
                        } else {
                            showMsg(result.data.error || 'Ошибка', 'error');
                            btn.disabled = false;
                        }
                    })
                    .catch(function() {
                        showMsg('Ошибка сети', 'error');
                        btn.disabled = false;
                    });
            });
        })();
    </script>
</body>
</html>
